# iDempiere Redis backend — bundle-specific knobs
#
# Copy this file to $IDEMPIERE_HOME/redis.properties and edit for your
# deployment. All keys are optional; sensible defaults apply. The bundle reads
# this file at startup; restart the JVM to apply changes.

# =============================================================================
# REQUIRED to activate the bundle: JVM system property
# =============================================================================
# The Redis bundle is opt-in. By default it stays passive (loads in OSGi but
# registers no services), so installing the bundle does not affect Hazelcast
# deployments. To activate, pass on the JVM command line / launcher script:
#
#     -Didempiere.distributed.backend=redis
#
# Alternative: set IDEMPIERE_DISTRIBUTED_BACKEND=redis in the environment.
# When active, the bundle registers ICacheService / IMessageService /
# IClusterService with service.ranking=100, shadowing the Hazelcast services.
# Set the value to "hazelcast" (or unset entirely) to keep using Hazelcast.

# =============================================================================
# REQUIRED for production: deployment instance name
# =============================================================================
# Used to namespace every Redis key this deployment writes (final form:
# idempiere:<instance-name>:...). Multiple iDempiere deployments
# (dev/staging/prod, per-tenant ECS task, etc.) sharing one Redis MUST have
# distinct instance names or they will collide on cache keys.
#
# Resolution precedence (highest first):
#   1. redis.instance.name in this file (explicit override)
#   2. IDEMPIERE_INSTANCE_NAME environment variable
#   3. ADEMPIERE_DB_NAME from $IDEMPIERE_HOME/idempiereEnv.properties
#      (auto-derived: two deployments pointing at the same DB share a
#       namespace by default, which is usually correct - the cache mirrors
#       the DB they back)
#   4. "default" with a WARN log
#
# Set this only when you need to override the auto-derived name - e.g. a
# sandbox copy-of-prod that connects to the same DB but must NOT share
# the cache namespace with production.
# =============================================================================
# redis.instance.name=prod-uswest2

# =============================================================================
# Caffeine near-cache (optional speed optimization)
# =============================================================================
# When enabled, every map returned by ICacheService.getMap() is wrapped with a
# Caffeine in-memory layer in front of Redis. Hot reads are served in
# microseconds from the local JVM heap; misses fall through to Redis.
#
# Caveat: stale reads possible during the expireAfterWrite window between a
# write landing on Redis on node A and the same key being re-fetched on node B
# (whose Caffeine layer keeps the previous value until expiry).
#
# Defaults: disabled, 10000 entries per cache, 5-minute expireAfterWrite.
# expireAfterWrite uses ISO-8601 duration syntax (PT30S, PT5M, PT1H, ...).
# =============================================================================
# near-cache.enabled=false
# near-cache.maxSize=10000
# near-cache.expireAfterWrite=PT5M

# =============================================================================
# Redis-down fallback cache (graceful degradation)
# =============================================================================
# When the circuit breaker trips OPEN, the near-cache TTL (default 5m) is
# usually too short to bridge a multi-minute Redis outage. The fallback layer
# is a SECOND Caffeine cache, sized larger and with a longer TTL, populated
# as a side-effect of every successful Redis read. While the breaker is OPEN
# it is the ONLY source consulted, so callers continue to see (possibly stale)
# values instead of nulls until Redis recovers.
#
# Only meaningful when near-cache.enabled=true (the wrapper that hosts the
# fallback layer is opt-in). Defaults: enabled when near-cache is enabled,
# 100,000 entries, 30-minute expireAfterWrite.
# =============================================================================
# fallback.enabled=true
# fallback.maxSize=100000
# fallback.expireAfterWrite=PT30M

# =============================================================================
# Circuit breaker tuning
# =============================================================================
# After failure-threshold consecutive Redis call failures, the bundle trips its
# breaker to OPEN: subsequent cache calls short-circuit (return null) instead of
# waiting for Redisson's per-call connection timeout. Once probe-interval has
# elapsed in OPEN state, the next isHealthy() check runs a lightweight Redis
# probe; on success the breaker closes.
#
# Defaults: 5 consecutive failures to trip, 60 seconds between recovery probes.
# probe-interval uses ISO-8601 duration syntax.
# =============================================================================
# redis.circuit.failure-threshold=5
# redis.circuit.probe-interval=PT60S

# =============================================================================
# Reliable messaging (Redis Streams) for IMessageService topics
# =============================================================================
# By default IMessageService.getTopic() returns a Redisson RTopic backed by
# plain Redis pub/sub: fire-and-forget, no message persistence. A subscriber
# that briefly disconnects misses every message published in that window -
# typically fine for ephemeral notifications, but it means cache-invalidation
# messages can be silently dropped during a network blip, leaving the
# disconnected node serving stale CCache values until its TTL expires.
#
# Set messaging.reliable=true to back topics with RReliableTopic instead.
# RReliableTopic uses Redis Streams with per-subscriber consumer groups:
# messages persist in the stream until acknowledged, so a reconnecting
# subscriber drains the missed messages before resuming live delivery.
#
# Trade-off: Streams cost more memory (Redis stores the message log) and CPU
# (Redis maintains consumer offsets), and an evicted/crashed subscriber leaves
# its consumer group behind until it eventually times out. Acceptable for most
# deployments where invalidation reliability matters more than topic overhead.
#
# Default: false (matches Hazelcast bundle's fire-and-forget topic semantics).
# =============================================================================
# messaging.reliable=false

# =============================================================================
# Redis keyspace notifications (passive observability)
# =============================================================================
# When enabled, the bundle subscribes to Redis keyspace notifications under
# this deployment's prefix and republishes each event through OSGi EventAdmin
# on topic 'org/idempiere/redis/service/KEY_CHANGED' with properties
# {key, op, database, timestamp}.
#
# Useful for: building dashboards that react to Redis-side mutations, auditing
# direct redis-cli writes, surfacing TTL expirations, debugging invalidation
# flows without polling. Future iDempiere versions could use this to drive
# CCache invalidation from Redis events instead of explicit IMessageService
# broadcasts (currently the bundle's keyspace events are passive — emitted but
# not consumed by core).
#
# IMPORTANT: Redis only publishes keyspace events when the server-side config
# 'notify-keyspace-events' is set. Default is empty (silent). Recommended:
#
#     redis-cli CONFIG SET notify-keyspace-events KEA
#
#   K - keyspace events    E - keyevent events
#   A - all g$lshzxe ops   K and E may be combined with specific ops
#
# Note: CONFIG SET changes are runtime-only and are lost on Redis restart.
# To persist the setting, also run "CONFIG REWRITE" after setting it, or
# add "notify-keyspace-events KEA" to redis.conf / your managed Redis
# parameter group (AWS ElastiCache, GCP Memorystore, etc.).
#
# Without that, the subscriber starts but receives nothing. The bundle log
# emits a hint at startup so this requirement is visible.
#
# Default: false.
# =============================================================================
# keyspace.notifications.enabled=false

# =============================================================================
# RPC security — REQUIRED in any non-development deployment
# =============================================================================
# The cluster RPC topic carries serialized Callable objects. Any principal with
# Redis write access can publish a forged request and execute arbitrary code on
# every cluster node (CVE-2023-42809 / Kryo deserialization gadgets).
#
# Two independent mitigations are available and BOTH should be used in prod:
#
# 1. Callable class allow-list
#    Comma-separated list of fully-qualified class names that are allowed to
#    appear as Callable implementations (and as their return / exception types)
#    in RPC requests. When non-empty, the bundle uses a restricted Kryo codec
#    with registrationRequired=true on both RPC topics, rejecting all other
#    types at deserialization time.
#
#    Known iDempiere core Callable implementations (add your own plugins' classes
#    to the list as needed):
#
#    rpc.callable.allowlist=\
#      org.compiere.util.ResetCacheCallable,\
#      org.compiere.util.GetCacheInfoCallable,\
#      org.compiere.util.CacheNewRecordCallable,\
#      org.idempiere.server.cluster.callable.StartAllCallable,\
#      org.idempiere.server.cluster.callable.StopCallable,\
#      org.idempiere.server.cluster.callable.GetAllCallable,\
#      org.idempiere.server.cluster.callable.StartCallable,\
#      org.idempiere.server.cluster.callable.ReloadCallable,\
#      org.idempiere.server.cluster.callable.ReadLogCallable,\
#      org.idempiere.server.cluster.callable.RotateLogCallable,\
#      org.idempiere.server.cluster.callable.DeleteLogsCallable,\
#      org.idempiere.server.cluster.callable.GetLogInfoCallable,\
#      org.idempiere.server.cluster.callable.GetSystemInfoCallable,\
#      org.idempiere.server.cluster.callable.GetServerCountCallable,\
#      org.idempiere.server.cluster.callable.GetStartTimeCallable,\
#      org.idempiere.server.cluster.callable.SetTraceLevelCallable,\
#      org.idempiere.server.cluster.callable.AddSchedulerCallable,\
#      org.idempiere.server.cluster.callable.RemoveSchedulerCallable
#
# 2. HMAC envelope authentication
#    Shared secret used to sign/verify RPC request envelopes. When set, each
#    node computes HMAC-SHA256(secret, taskId + "|" + originatorUuid) and
#    attaches it to the request. Receivers reject any request with a missing
#    or invalid HMAC before deserializing the Callable.
#    All cluster nodes must share the same value. Use a random secret of at
#    least 32 characters; keep it out of source control.
#
# rpc.hmac.secret=
#
# Additionally: enforce Redis TLS and ACLs so only iDempiere nodes can connect
# to Redis at all. Do not expose Redis ports on a flat network.
# =============================================================================
# rpc.callable.allowlist=
# rpc.hmac.secret=
